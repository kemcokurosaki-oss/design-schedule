name: 新規タスク追加通知

on:
  # schedule:
  #   - cron: '0 0 * * *'  # 毎朝9時JST（UTC 0:00）← 開始時にコメントを外す
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'テストモード（e-kurosaki@kusakabe.comのみ送信）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: パッケージインストール
        run: npm install
      - name: 新規タスク追加通知を送信
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: node scripts/notify-new-tasks.js
