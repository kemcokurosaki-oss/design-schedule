<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設計工程表 - 安定版</title>
    
    <!-- DHTMLX Gantt -->
    <link rel="stylesheet" href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css">
    <script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
    <!-- Pro版（リソース機能）が必要な場合は、ライセンス版のJSを読み込む必要があります -->
    <!-- 現在はCDNのedge版（通常はStandard版）を読み込んでいるため、一部のPro機能が制限されている可能性があります -->
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "メイリオ", Meiryo, "MS PGothic", sans-serif; font-size: 12px; }
        .main-container { display: flex; flex-direction: column; height: 100vh; }
        .header-panel { background: #fff; padding: 5px 10px; border-bottom: 1px solid #ccc; display: flex; flex-direction: column; gap: 5px; }
        .header-row { display: flex; align-items: center; gap: 15px; width: 100%; }
        .project-info { font-size: 16px; font-weight: bold; color: #333; }
        .zoom-controls { display: flex; gap: 5px; }
        .action-controls { margin-left: auto; display: flex; gap: 5px; }
        .btn { padding: 2px 10px; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: "メイリオ", Meiryo, sans-serif; }
        .zoom-btn { font-size: 13px; }
        .btn-primary { background: #2ecc71; color: #fff; border-color: #27ae60; font-weight: bold; font-size: 13px; }
        .btn-info { background: #3498db; color: #fff; border-color: #2980b9; font-weight: bold; font-size: 13px; }
        .btn-filter { background: #f0f0f0; color: #333; border-color: #ccc; font-weight: bold; font-size: 13px; }
        .btn-filter.active { background: #3498db; color: #fff; border-color: #2980b9; }
        .zoom-btn.active { background: #3498db; color: #fff; border-color: #3498db; }
        
        /* レイアウト用 */
        #gantt_here {
            flex: 1;
            width: 100%;
            /* height: 100% を削除して flexbox に任せる */
            min-height: 0; 
        }
        
        /* 独立したリソースパネル */
        #resource_panel {
            display: none;
            height: 250px;
            min-height: 50px;
            border-top: 4px solid #ccc;
            background: #fff;
            flex-direction: column;
            position: relative;
            z-index: 1000;
        }
        /* リソース全画面モード */
        #resource_panel.resource-fullscreen {
            flex: 1 !important;
            height: auto !important;
            min-height: 0 !important;
            border-top: none !important;
        }
        #resource_panel.resource-fullscreen #resource_resizer {
            display: none;
        }
        #resource_resizer {
            height: 12px; /* 当たり判定も少し拡大 */
            cursor: ns-resize;
            background: transparent;
            width: 100%;
            position: absolute;
            top: -8px; /* 境界線(4px)の上に重なるように調整 */
            left: 0;
            z-index: 1001;
            transition: background 0.2s;
        }
        #resource_resizer::before {
            content: "";
            position: absolute;
            top: 4px; 
            left: 0;
            width: 100%;
            height: 4px; /* 境界線と同じ太さ（4px） */
            background: transparent;
            transition: background 0.2s;
        }
        #resource_resizer:hover::before {
            background: #3498db; 
        }
        .resource-header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            font-size: 13px;
            font-weight: bold;
            color: #2c3e50;
        }
        .resource-header-close {
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            color: #999;
            border: none;
            background: none;
            padding: 0 5px;
        }
        .resource-header-close:hover {
            color: #333;
        }
        .resource-content {
            flex: 1;
            overflow: auto;
        }
        .resource-content-inner {
            position: relative;
        }

        /* リソースカレンダーヘッダー */
        #resource_calendar_header {
            flex-shrink: 0;
            overflow: hidden;
            background: #546e7a;
            border-bottom: 2px solid #455a64;
            font-family: "メイリオ", Meiryo, sans-serif;
        }
        #resource_calendar_header .cal-row {
            display: flex;
            overflow: hidden;
        }
        #resource_calendar_header .cal-spacer {
            flex-shrink: 0;
            border-right: 2px solid #37474f;
            background: #546e7a;
        }
        #resource_cal_scroll {
            overflow: hidden;
            flex: 1;
        }
        .resource-cal-cell {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-family: "メイリオ", Meiryo, sans-serif;
            color: #fff;
            box-sizing: border-box;
            overflow: hidden;
            white-space: nowrap;
            border-right: 1px solid #607d8b;
        }
        .resource-cal-month {
            background: #455a64;
            font-weight: bold;
            font-size: 12px;
            border-right: 1px solid #37474f;
        }
        .resource-cal-weekend {
            background: #607d8b;
        }
        
        /* リソースバーのスタイル（index.htmlから移植） */
        .resource-item { border-bottom: 1px solid #ebebeb !important; }
        .resource-grid-container { background: #f9f9f9; }
        .resource-cell { display: flex; align-items: center; padding: 0 4px; box-sizing: border-box; }
        .resource-timeline { position: relative; background: #fff; }
        .resource-today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff5252 !important; opacity: 1.0; z-index: 2 !important; pointer-events: none; }
        .resource-cell-bar {
            position: absolute;
            border-radius: 3px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            font-size: 13px;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
            text-shadow: none;
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.15);
        }
        .resource-bar-text { padding: 0 5px; overflow: hidden; text-overflow: ellipsis; }
        
        /* 担当者ごとのバーの色設定（区別しやすいように調整） */
        .owner-fujiyama { background-color: #e74c3c !important; border-color: #c0392b !important; color: #fff !important; } /* 鮮やかな赤 */
        .owner-tanaka { background-color: #3498db !important; border-color: #2980b9 !important; color: #fff !important; }   /* 鮮やかな青 */
        .owner-yasuoka { background-color: #2ecc71 !important; border-color: #27ae60 !important; color: #fff !important; }  /* 鮮やかな緑 */
        .owner-kawabe { background-color: #f39c12 !important; border-color: #d35400 !important; color: #fff !important; }  /* オレンジ */
        .owner-dan { background-color: #9b59b6 !important; border-color: #8e44ad !important; color: #fff !important; }     /* 濃い紫 */
        .owner-horii { background-color: #1abc9c !important; border-color: #16a085 !important; color: #fff !important; }   /* ターコイズ */
        .owner-miyazaki { background-color: #e84393 !important; border-color: #d63031 !important; color: #fff !important; } /* 濃いピンク */
        .owner-tsuda { background-color: #badc58 !important; border-color: #6ab04c !important; color: #222 !important; }   /* ライム */
        .owner-komura { background-color: #2c3e50 !important; border-color: #1a252f !important; color: #fff !important; }   /* ネイビー */
        .owner-shibata { background-color: #f1c40f !important; border-color: #f39c12 !important; color: #222 !important; }  /* 鮮やかな黄 */
        .owner-hashimoto { background-color: #686de0 !important; border-color: #4834d4 !important; color: #fff !important; } /* ロイヤルブルー */
        .owner-matsumoto { background-color: #7ed6df !important; border-color: #22a6b3 !important; color: #222 !important; } /* 明るい水色 */
        .owner-default { background-color: #95a5a6 !important; border-color: #7f8c8d !important; color: #fff !important; }  /* グレー */

        /* コンフリクト背景（無効化：透明に設定） */
        .resource-cell-conflict-bg {
            background: transparent !important;
        }

        /* 土日の背景色 */
        .weekend { background: #f0f0f0 !important; }
        /* 今日の赤線（マーカー）の強制表示 */
        .today-line, .gantt_marker {
            background-color: #ff4d4d !important;
            width: 2px !important;
            z-index: 9999 !important;
            position: absolute !important;
        }

        /* マーカーが表示されない原因となる overflow を解除 */
        .gantt_marker_area {
            z-index: 5 !important;
        }

        /* ライトボックス（編集ダイアログ）を常に最前面に表示 */
        .gantt_cal_light, .gantt_modal_box, .gantt_cal_cover {
            z-index: 99999 !important;
        }

        /* マーカー上部の「今日」というラベルも強制表示 */
        .gantt_marker_content {
            background: #ff4d4d !important;
            color: #fff !important;
            z-index: 10000 !important;
            font-weight: bold !important;
            padding: 2px 5px !important;
            border-radius: 3px !important;
            font-size: 11px !important;
        }
        /* 日付がないタスクのバーを隠す */
        .hidden_bar { display: none !important; }
        
        /* 標準的なタスクスタイル */
        .gantt_task_line { border-radius: 4px; }
        .gantt_task_content { font-size: 11px; font-family: "メイリオ", Meiryo, sans-serif; }

        /* グリッドのフォント設定 */
        .gantt_grid_data .gantt_cell {
            font-family: "メイリオ", Meiryo, sans-serif !important;
            font-size: 13px !important;
            font-weight: normal !important;
            padding: 0 !important;
        }
        /* グリッド内カスタム追加ボタン */
        .custom_add_btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            line-height: 1;
            font-size: 16px;
            color: #546e7a;
            cursor: pointer;
            border-radius: 3px;
            user-select: none;
        }
        .custom_add_btn:hover { color: #2ecc71; }
        /* インラインエディタ入力欄 */
        .gantt_grid_data .gantt_cell .gantt_tree_content input,
        .gantt_grid_data .gantt_cell input {
            width: 100% !important;
            height: 100% !important;
            box-sizing: border-box !important;
            border: 1px solid #7986cb !important;
            padding: 0 2px !important;
            font-family: "メイリオ", Meiryo, sans-serif !important;
            font-size: 13px !important;
            outline: none !important;
        }

        .gantt_grid_scale .gantt_grid_head_cell {
            font-family: "メイリオ", Meiryo, sans-serif !important;
            font-size: 14px !important;
            font-weight: normal !important;
            padding: 0 !important;
        }

        /* グリッドヘッダーを青にする */
        .gantt_grid_scale, .gantt_grid_head_cell {
            background-color: #546e7a !important; /* くすんだ青（ブルーグレー） */
            color: #ffffff !important;
            border-right: 1px solid #455a64 !important;
            line-height: normal !important; /* 改行を許可するために追加 */
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            text-align: center !important;
        }

        /* 階層構造を使用しないためインデントとアイコンのスペースをゼロに */
        .gantt_tree_indent {
            width: 0 !important;
        }
        .gantt_tree_icon {
            width: 0 !important;
            display: none !important;
        }

        /* タスクの背景色を水色とさらに薄い水色で交互にする */
        .gantt_row {
            background-color: #f8fafc !important; /* 非常に明るいグレーブルー */
        }
        .gantt_row.odd {
            background-color: #e2e8f0 !important; /* 落ち着いた薄いブルーグレー */
        }
        /* ホバー時の色も調整 */
        .gantt_row:hover {
            background-color: #cbd5e1 !important; /* 少し濃いくすんだ青 */
        }

        /* 進捗列の背景色（グラデーションによる進捗表示） */
        .progress-cell-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            overflow: hidden; /* はみ出し防止 */
        }
        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: #ffd54f; /* 鮮やかな山吹色（黄色とオレンジの中間） */
            z-index: -1;
        }
        .progress-overdue {
            background-color: #e53935 !important; /* 鮮やかさと落ち着きのバランスが良い赤 */
        }

        /* タイムラインカレンダーヘッダーをリソースヘッダーと統一 */
        #gantt_here .gantt_task_scale {
            background: #546e7a !important;
            border-bottom: 2px solid #455a64 !important;
        }
        #gantt_here .gantt_scale_line {
            background: #546e7a !important;
            border-bottom: none !important;
        }
        #gantt_here .gantt_scale_line:first-child {
            background: #455a64 !important;
            border-bottom: 1px solid #37474f !important;
        }
        #gantt_here .gantt_scale_cell {
            color: #fff !important;
            border-right: 1px solid #607d8b !important;
            font-family: "メイリオ", Meiryo, sans-serif !important;
            font-size: 11px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            line-height: normal !important;
        }
        #gantt_here .gantt_scale_line:first-child .gantt_scale_cell {
            font-size: 12px !important;
            font-weight: bold !important;
            border-right: 1px solid #37474f !important;
            background: #455a64 !important;
        }
        /* 日・曜日行(2行目以降)の土日背景 */
        #gantt_here .gantt_scale_line:nth-child(n+2) .gantt_scale_cell.gantt-scale-sun,
        #gantt_here .gantt_scale_line:nth-child(n+2) .gantt_scale_cell.gantt-scale-sat {
            background: #607d8b !important;
        }
        /* 日付行・曜日行(2行目以降)の土日文字色 */
        #gantt_here .gantt_scale_line:nth-child(n+2) .gantt_scale_cell.gantt-scale-sun {
            color: #ffcccc !important;
        }
        #gantt_here .gantt_scale_line:nth-child(n+2) .gantt_scale_cell.gantt-scale-sat {
            color: #cce0ff !important;
        }

        /* リソースの重なり（オーバーラップ）のスタイル（無効化） */
        .overload-cell {
            background: transparent !important;
        }
        /* リソースセル内のバー表示 */
        .has-resource-bar {
            position: relative !important;
        }
        .has-resource-bar::after {
            content: "" !important;
            position: absolute !important;
            top: 6px !important;
            bottom: 6px !important;
            left: 0 !important;
            right: 0 !important;
            background-color: #FBAD4F !important;
            border-radius: 4px !important;
            z-index: 5 !important;
            display: block !important;
        }
        /* 重複時は背景色を変えて強調（無効化） */
        .overload-cell {
            background-color: transparent !important;
        }
        .overload-cell::after {
            background-color: #FBAD4F !important; /* 重複箇所もオレンジにする */
        }
        /* セル自体の枠線を見やすく */
        .gantt_resource_cell {
            border-right: 1px solid #ebebeb !important;
            box-sizing: border-box !important;
        }
        .gantt_resource_marker.overtime, 
        .gantt_resource_marker_overtime,
        .gantt_resource_marker {
            background-color: #FBAD4F !important;
            background-image: none !important;
            opacity: 1.0 !important;
        }
        
        /* タイムライン上のリソースセルの背景パターンを完全に無効化 */
        .gantt_resource_cell, 
        .gantt_resource_marker, 
        .gantt_resource_marker_overtime,
        [class*="gantt_resource_marker"] {
            background-image: none !important;
        }
        /* リソースタイムラインのヘッダーを完全に非表示にする */
        .gantt_resource_timeline .gantt_scale_line,
        .gantt_resource_timeline .gantt_task_scale {
            display: none !important;
            height: 0 !important;
            border: none !important;
        }
        /* リソースグリッドのヘッダーを調整（1行のみ表示し、左寄せにする） */
        .gantt_resource_grid .gantt_grid_scale {
            background-color: #f8f9fa !important;
            height: 30px !important;
            line-height: 30px !important;
            border-bottom: 2px solid #ccc !important;
            position: relative;
        }
        .gantt_resource_grid .gantt_grid_scale::before {
            content: "担当者別リソース";
            position: absolute;
            left: 15px;
            top: 0;
            font-weight: bold;
            font-size: 13px;
            color: #2c3e50;
            z-index: 10;
        }
        /* グリッドヘッダー内の元のセルを隠す */
        .gantt_resource_grid .gantt_grid_head_cell {
            display: none !important;
        }

        /* リソース担当者名リンク */
        .resource-owner-link {
            width: 120px;
            text-align: left;
            cursor: pointer;
            color: #333;
            border-radius: 3px;
            padding: 2px 4px;
            transition: background 0.15s, color 0.15s;
        }
        .resource-owner-link:hover {
            background: #546e7a;
            color: #fff;
        }


        /* リソースセルのスタイル調整 */
        .gantt_matrix_cell {
            overflow: visible !important; /* セルからはみ出しても隠さない */
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        /* 右クリックコンテキストメニュー */
        #gantt_ctx_menu {
            display: none;
            position: fixed;
            z-index: 99999;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.2);
            min-width: 150px;
            padding: 4px 0;
            font-family: "メイリオ", Meiryo, sans-serif;
        }
        .gantt_ctx_item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
        }
        #gantt_ctx_copy { color: #1565c0; }
        #gantt_ctx_copy:hover { background: #e3f2fd; }
        #gantt_ctx_delete { color: #c62828; }
        #gantt_ctx_delete:hover { background: #ffebee; }
        /* 複数選択削除ボタン */
        #multi_delete_btn {
            display: none;
            background: #e53935;
            color: #fff;
            border-color: #c62828;
            font-weight: bold;
        }
        #multi_delete_btn:hover { background: #c62828; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-panel">
            <div class="header-row">
                <div class="project-info" id="project_display">工事番号: 全表示</div>
            </div>
            <div class="header-row">
                <button class="btn btn-filter" id="resource_home_btn" onclick="returnToResourceView()">担当別</button>
                <button class="btn btn-filter" id="plan_filter_btn" onclick="togglePlanFilter()">計画</button>
                <button class="btn btn-filter" id="drawing_filter_btn" onclick="toggleDrawingFilter()">図面</button>
                <button class="btn btn-filter" id="longterm_filter_btn" onclick="toggleLongtermFilter()">長納期品</button>
                <button class="btn btn-filter" id="trip_filter_btn" onclick="toggleTripFilter()">出張</button>
            </div>
            <div class="header-row">
                <div class="zoom-controls">
                    <button class="btn zoom-btn active" onclick="setZoom('day', this)">日単位</button>
                    <button class="btn zoom-btn" onclick="setZoom('week', this)">週単位</button>
                </div>
                <select id="project_select" style="padding: 5px; min-width: 150px; margin-left: 15px;"></select>
                <button class="btn" onclick="loadData()">更新</button>
                <div class="action-controls">
                    <button class="btn btn-info" id="resource_toggle" onclick="toggleResourceView()">リソース表示</button>
                    <button class="btn btn-primary" onclick="createTask()">+ 新規タスク追加</button>
                    <button class="btn" id="multi_delete_btn" onclick="deleteSelectedTasks()">選択削除 (<span id="multi_delete_count">0</span>件)</button>
                </div>
            </div>
        </div>
        <div id="gantt_here" style="width:100%; height:100%;"></div>

        <!-- 独立したリソースパネル -->
        <div id="resource_panel">
            <div id="resource_resizer"></div>
            <div class="resource-header-bar">
                <div style="display:flex; align-items:center;">
                    <span id="resource_title">担当者別リソース状況</span>
                    <button type="button" class="btn" id="resource_back_btn" onclick="showOwnerOverview()" style="display:none; font-size:11px; padding:2px 8px; margin-left:50px; font-family:'メイリオ',Meiryo,sans-serif;">← 一覧に戻る</button>
                </div>
                <button type="button" class="resource-header-close" id="resource_close_btn" title="リソース画面を閉じる">×</button>
            </div>
            <div id="resource_calendar_header"></div>
            <div class="resource-content">
                <div id="resource_content_inner" class="resource-content-inner">
                    <!-- ここにJSでHTMLが挿入される -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // リソース表示状態
        let isResourceView = false;
        let lastOwnerName = '';
        let currentResourceOwnerFilter = "";
        let _resourceDetailOwner = null; // null=一覧表示, string=特定担当者の詳細表示

        // レイアウト定義

        };

        // リサイズ機能
        (function() {
            let isResizing = false;
            let animationFrameId = null;
            const minHeight = 50;
            const maxHeight = 800;

            window.addEventListener('DOMContentLoaded', () => {
                const resizer = document.getElementById('resource_resizer');
                const panel = document.getElementById('resource_panel');
                const ganttContainer = document.getElementById('gantt_here');

                if (!resizer || !panel) return;

                resizer.addEventListener('mousedown', (e) => {
                    isResizing = true;
                    document.body.style.cursor = 'ns-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });

                window.addEventListener('mousemove', (e) => {
                    if (!isResizing) return;
                    
                    if (animationFrameId) return; // すでに処理待ちならスキップ

                    animationFrameId = requestAnimationFrame(() => {
                        const windowHeight = window.innerHeight;
                        let newHeight = windowHeight - e.clientY;
                        
                        if (newHeight < minHeight) newHeight = minHeight;
                        if (newHeight > maxHeight) newHeight = maxHeight;
                        if (newHeight > windowHeight * 0.8) newHeight = windowHeight * 0.8;
                        
                        // パネルの高さを更新（flexboxによりメインガントは自動で縮む）
                        panel.style.height = newHeight + 'px';
                        
                        // ガントのサイズ調整（描画を伴うので負荷が高い）
                        if (window.gantt) {
                            gantt.setSizes();
                        }
                        
                        animationFrameId = null;
                    });
                });

                window.addEventListener('mouseup', () => {
                    if (isResizing) {
                        isResizing = false;
                        document.body.style.cursor = 'default';
                        document.body.style.userSelect = '';
                        if (animationFrameId) {
                            cancelAnimationFrame(animationFrameId);
                            animationFrameId = null;
                        }
                        // 最後に確実にサイズを合わせる
                        if (window.gantt) {
                            gantt.setSizes();
                        }
                    }
                });
            });
        })();

        // リソース表示の列幅定数（担当者名 / 詳細タスク名）
        const RESOURCE_OVERVIEW_COL_WIDTH = 120;  // 担当者名列

        // ガントのタイムライン開始位置を取得（グリッド幅＋リサイザー幅を含む正確な値）
        function _getRenderedGanttGridWidth() {
            // .gantt_task の offsetLeft がタイムライン開始ピクセルと完全一致する
            const taskEl = document.querySelector('#gantt_here .gantt_task');
            if (taskEl && taskEl.offsetLeft > 0) return taskEl.offsetLeft;
            const gridEl = document.querySelector('#gantt_here .gantt_grid');
            return gridEl ? gridEl.offsetWidth : (gantt.config.grid_width || 834);
        }

        function updateResourceData() {
            // 指定された担当者の並び順（藤山～松本(英)、外注は除外）
            const targetOwners = ["藤山", "田中(善)", "安岡", "川邊", "檀", "堀井", "宮﨑", "津田", "古村", "柴田", "橋本", "松本(英)"];
            
            const activeOwners = [];
            
            // 各担当者について、該当するタスクがあるかチェック
            targetOwners.forEach(ownerName => {
                let hasTask = false;
                gantt.eachTask(function(task){
                    if (hasTask) return;
                    const isDetailed = (task.is_detailed === true || String(task.is_detailed).toLowerCase() === "true" || String(task.is_detailed).toLowerCase() === "t" || String(task.is_detailed) === "1");
                    if (isDetailed && task.owner) {
                        const owners = String(task.owner).split(/[,、\s]+/).map(o => o.trim());
                        // 田中(善)の場合、"田中(善)" または "田中" が含まれているかチェック
                        if (ownerName === "田中(善)") {
                            if (owners.includes("田中(善)") || owners.includes("田中")) {
                                hasTask = true;
                            }
                        } else if (owners.includes(ownerName)) {
                            hasTask = true;
                        }
                    }
                });
                
                if (hasTask) {
                    activeOwners.push(ownerName);
                }
            });

            console.log("Found active owners for resource view:", activeOwners);
            if (_resourceDetailOwner) {
                renderOwnerDetailTimeline(_resourceDetailOwner);

        function renderOwnerDetailTimeline(ownerName) {

            ownerTasks.sort((a, b) => {

        const _DOW_NAMES = ['日', '月', '火', '水', '木', '金', '土'];

        function renderResourceCalendarHeader() {
            const header = document.getElementById('resource_calendar_header');
            if (!header) return;
            // ボトムパネル時はカレンダーヘッダー不要
            if (!isResourceFullscreen) {
                header.style.display = 'none';
                return;
            }
            header.style.display = '';

            const scale = gantt.getScale();
            const timelineWidth = scale.full_width;
            const columnWidth = scale.col_width;
            // 全画面時は専用幅、ボトムパネル時はガントのグリッド幅に合わせる
            const actualGridWidth = isResourceFullscreen
                ? (_resourceDetailOwner ? RESOURCE_DETAIL_COL_WIDTH : RESOURCE_OVERVIEW_COL_WIDTH)
                : (_getRenderedGanttGridWidth());
            const dates = scale.trace_x;
            const unit = gantt.getState().scale_unit;

            // 月グループを作成
            const months = [];
            let curMonth = -1, curYear = -1, monthStart = 0;
            dates.forEach((date, i) => {
                const m = date.getMonth(), y = date.getFullYear();
                if (m !== curMonth || y !== curYear) {
                    if (curMonth !== -1) months.push({ month: curMonth, year: curYear, count: i - monthStart });
                    curMonth = m; curYear = y; monthStart = i;
                }
            });
            if (dates.length > 0) months.push({ month: curMonth, year: curYear, count: dates.length - monthStart });

            // 月行HTML
            let monthHtml = '';
            months.forEach(m => {
                const w = m.count * columnWidth;
                monthHtml += `<div class="resource-cal-cell resource-cal-month" style="width:${w}px;min-width:${w}px;height:22px;">${m.year}年${m.month + 1}月</div>`;
            });

            // 日/週行HTML・曜日行HTML（日単位のみ曜日行あり）
            let dayHtml = '';
            let dowHtml = '';
            dates.forEach(date => {
                const dow = date.getDay();
                const isSun = dow === 0;
                const isSat = dow === 6;
                const wkCls = (isSun || isSat) ? ' resource-cal-weekend' : '';
                const dowColor = isSun ? 'color:#ffcccc;' : isSat ? 'color:#cce0ff;' : '';
                const d = date.getDate();

                if (unit === 'day') {
                    dayHtml += `<div class="resource-cal-cell${wkCls}" style="width:${columnWidth}px;min-width:${columnWidth}px;height:18px;${dowColor}">${d}</div>`;
                    dowHtml += `<div class="resource-cal-cell${wkCls}" style="width:${columnWidth}px;min-width:${columnWidth}px;height:18px;${dowColor}">${_DOW_NAMES[dow]}</div>`;
                } else {
                    // 週単位：日付のみ表示（曜日行なし）
                    dayHtml += `<div class="resource-cal-cell" style="width:${columnWidth}px;min-width:${columnWidth}px;height:18px;">${d}</div>`;
                }
            });

            const dowRow = unit === 'day' ? `
                <div class="cal-row" style="height:18px;">
                    <div class="cal-spacer" style="width:${actualGridWidth}px;min-width:${actualGridWidth}px;height:18px;"></div>
                    <div id="resource_cal_scroll3" style="overflow:hidden;flex:1;">
                        <div style="display:flex;width:${timelineWidth}px;">${dowHtml}</div>
                    </div>
                </div>` : '';

            header.innerHTML = `
                <div class="cal-row" style="height:22px;">
                    <div class="cal-spacer" style="width:${actualGridWidth}px;min-width:${actualGridWidth}px;height:22px;"></div>
                    <div id="resource_cal_scroll" style="overflow:hidden;flex:1;">
                        <div style="display:flex;width:${timelineWidth}px;">${monthHtml}</div>
                    </div>
                </div>
                <div class="cal-row" style="height:18px;">
                    <div class="cal-spacer" style="width:${actualGridWidth}px;min-width:${actualGridWidth}px;height:18px;"></div>
                    <div id="resource_cal_scroll2" style="overflow:hidden;flex:1;">
                        <div style="display:flex;width:${timelineWidth}px;">${dayHtml}</div>
                    </div>
                </div>
                ${dowRow}
            `;
        }

        // リソース全画面モードを抜けてガントビューへ
        function _exitResourceFullscreen() {
            isResourceFullscreen = false;
            isResourceView = false;
            const panel = document.getElementById("resource_panel");

            const btn = document.getElementById("resource_toggle");

        function _applyGanttScaleWeekendClasses() {
            const scale = gantt.getScale();
            if (!scale || !scale.trace_x) return;
            const dates = scale.trace_x;
            const scaleLines = document.querySelectorAll('#gantt_here .gantt_scale_line');
            scaleLines.forEach((line, lineIdx) => {
                if (lineIdx === 0) return; // 月行はスキップ
                const cells = line.querySelectorAll('.gantt_scale_cell');
                cells.forEach((cell, i) => {
                    const date = dates[i];

                    const dow = date.getDay();
                    cell.classList.remove('gantt-scale-sun', 'gantt-scale-sat');
                    if (dow === 0) cell.classList.add('gantt-scale-sun');
                    else if (dow === 6) cell.classList.add('gantt-scale-sat');

            });

        async function createTask() {
            const projectSelect = document.getElementById('project_select');
            const projectNumber = projectSelect ? projectSelect.value : "";

            // 現在表示中のタスク一覧（onBeforeTaskDisplayと同じ条件でフィルタ）
            const visibleTasks = gantt.getTaskByTime().filter(t => {
                const isDetailed = (t.is_detailed === true || String(t.is_detailed).toUpperCase() === 'TRUE');
                if (!isDetailed) return false;
                if (projectNumber && String(t.project_number) !== String(projectNumber)) return false;
                if (currentTaskTypeFilter && String(t.task_type) !== currentTaskTypeFilter) return false;
                return true;
            });

            // 工事番号フィルタ選択中は最後の表示行から machine を引き継ぎ
            let inheritMachine = "";
            if (projectNumber && visibleTasks.length > 0) {
                inheritMachine = visibleTasks[visibleTasks.length - 1].machine || "";
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const endDate = new Date(today);
            endDate.setDate(endDate.getDate() + 1);

            const { data, error } = await supabaseClient
                .from('tasks')
                .insert([{
                    text: "",
                    start_date: today.toISOString(),
                    end_date: endDate.toISOString(),
                    project_number: projectNumber,
                    machine: inheritMachine,
                    unit: "",
                    unit2: "",
                    model_type: "",
                    characteristic: "",
                    derivation: "",
                    owner: "",
                    total_sheets: 0,
                    completed_sheets: 0,
                    task_type: currentTaskTypeFilter || "drawing",
                    is_detailed: true
                }])
                .select();

            if (error) {
                console.error("Error adding task:", error);
                alert("タスクの追加に失敗しました。\n" + error.message);
                return;
            }

            // データ再読み込みしてからインライン編集を起動
            await loadData();

            if (data && data[0]) {
                const newId = data[0].id;
                gantt.showTask(newId);
                const editCol = gantt.config.columns.find(c => c.name === "text");
                if (editCol && editCol.editor) {
                    setTimeout(() => {
                        gantt.ext.inlineEditors.startEdit(newId, "text");
                    }, 100);
                }
            }
        }

        // 長納期品列合計: 32+42+190+85+28+70+32+60+20 = 559px

        // 列設定の初期化
        gantt.config.columns = _getDrawingColumns();

        // 列セット切り替え
        function switchColumns(filterType) {
            const cols = filterType === 'long_lead_item' ? _getLongtermColumns() : _getDrawingColumns();
            gantt.config.columns = cols;
            _setLayout(_getColsSum(cols));
            gantt.render();
        }

        // スタイルとテンプレート
        gantt.templates.task_text = function(start, end, task) {
            const colorClass = getOwnerColorClass(task.owner);
            const textColor = (["owner-tsuda", "owner-shibata", "owner-matsumoto"].includes(colorClass)) ? "#222" : "#fff";
            return `<span style="color:${textColor};">${task.text}</span>`;
        };

        gantt.templates.task_class = function(start, end, task) {
            let css = task.has_no_date ? "hidden_bar " : "";
            css += getOwnerColorClass(task.owner);
            return css;
        };
        gantt.templates.timeline_cell_class = function(task, date) {
            if (date.getDay() === 0 || date.getDay() === 6) return "weekend";
            return "";
        };

        gantt.templates.grid_row_class = function(start, end, task) {
            return "";
        };

        // フィルタリング（is_detailedのみ表示、かつ工事番号フィルタ）
        gantt.attachEvent("onBeforeTaskDisplay", function(id, task) {
            // is_detailed が TRUE または "TRUE" のもののみ表示
            const isDetailed = (task.is_detailed === true || String(task.is_detailed).toUpperCase() === 'TRUE');
            if (!isDetailed) return false;

            // 工事番号フィルタ
            const pSelect = document.getElementById('project_select').value;
            if (pSelect && String(task.project_number) !== String(pSelect)) return false;

            // task_typeフィルタ
            if (currentTaskTypeFilter) {
                if (String(task.task_type) !== currentTaskTypeFilter) return false;
            }

            return true;
        });

        // データ読み込み
        async function loadData() {
            const { data, error } = await supabaseClient
                .from('tasks')
                .select('*')
                .order('project_number', { ascending: true })
                .order('id', { ascending: true });
            
            if (error) {
                console.error("Supabase error:", error);
                return;
            }

            const today = new Date().toISOString().split('T')[0];

            const parsedTasks = data.map(t => {
                const hasDates = (t.start_date && t.end_date);
                
                let startDate = hasDates ? new Date(t.start_date) : new Date(today);
                let endDate = hasDates ? new Date(t.end_date) : gantt.date.add(new Date(today), 1, "day");

                // 開始日と終了日が同じ場合、1日分の幅を確保するために終了日を翌日に調整
                if (hasDates && startDate.getTime() === endDate.getTime()) {
                    endDate = gantt.date.add(endDate, 1, "day");
                }
                
                return {
                    ...t,
                    start_date: startDate,
                    end_date: endDate,
                    has_no_date: !hasDates
                };
            });

            gantt.clearAll();
            gantt.parse({ 
                data: parsedTasks
            });

            // 追加：データ読み込み完了直後にリソースデータを更新
            if (isResourceView) {
                updateResourceData();
                gantt.render();
            }
        }

        // グローバル変数の定義
        let projectMap = new Map();
        let currentTaskTypeFilter = null; // null = 全表示
        let isResourceFullscreen = false;

        function updateFilterButtons() {
            document.getElementById('resource_home_btn').classList.toggle('active', isResourceFullscreen);
            document.getElementById('plan_filter_btn').classList.toggle('active', currentTaskTypeFilter === 'planning');
            document.getElementById('drawing_filter_btn').classList.toggle('active', currentTaskTypeFilter === 'drawing');
            document.getElementById('longterm_filter_btn').classList.toggle('active', currentTaskTypeFilter === 'long_lead_item');
            document.getElementById('trip_filter_btn').classList.toggle('active', currentTaskTypeFilter === 'business_trip');
        }

        // 担当別全画面モード中でもライトボックスを表示するラッパー
        function _showResourceLightbox(id) {
            const ganttEl = document.getElementById('gantt_here');
            if (isResourceFullscreen) {
                // ガントを0サイズで一時表示（ライトボックスはその中に生成されるため必要）
                ganttEl.style.cssText = 'display:block;position:fixed;top:0;left:0;width:0;height:0;overflow:visible;z-index:99998;';
            }
            gantt.showLightbox(id);
        }

        gantt.attachEvent('onAfterLightbox', function() {
            if (isResourceFullscreen) {
                // ライトボックスを閉じたらガントを再び非表示に戻す
                const ganttEl = document.getElementById('gantt_here');
                ganttEl.style.cssText = 'display:none;';
            }
        });

        function returnToResourceView() {
            if (isResourceFullscreen) return; // すでに担当別表示中
            currentTaskTypeFilter = null;
            updateFilterButtons();
            _enterResourceFullscreen();
        }

        function _colSetName(filterType) {
            return filterType === 'long_lead_item' ? 'longterm' : 'default';
        }

        function setTaskTypeFilter(type) {
            const prevColSet = _colSetName(currentTaskTypeFilter);
            currentTaskTypeFilter = (currentTaskTypeFilter === type) ? null : type;
            updateFilterButtons();

            if (currentTaskTypeFilter === null) {
                // フィルター全オフ → リソース全画面に戻す
                _enterResourceFullscreen();
            } else {
                // フィルターON → ガントビューに切り替え
                if (isResourceFullscreen) {
                    _exitResourceFullscreen();
                }
                if (_colSetName(currentTaskTypeFilter) !== prevColSet) {
                    switchColumns(currentTaskTypeFilter);
                } else {
                    gantt.refreshData();
                }
            }
        }

        function togglePlanFilter()     { setTaskTypeFilter('planning'); }
        function toggleDrawingFilter()  { setTaskTypeFilter('drawing'); }
        function toggleLongtermFilter() { setTaskTypeFilter('long_lead_item'); }
        function toggleTripFilter()     { setTaskTypeFilter('business_trip'); }

        // 工事番号セレクトボックスの表示更新
        function updateDisplay() {
            const select = document.getElementById('project_select');
            const display = document.getElementById('project_display');
            const pSelect = select.value;
            if (pSelect) {
                const info = projectMap.get(pSelect);
                display.innerText = `${pSelect} ${info?.customer || ""} ${info?.details || ""}`;
            } else {
                display.innerText = "工事番号: 全表示";
            }
            
            if (isResourceView) {
                updateResourceData();
            }
            gantt.render();
        }

        // 工事番号セレクトボックスの初期化
        async function initProjectSelect(projectParam) {
            const { data } = await supabaseClient
                .from('tasks')
                .select('project_number, customer_name, project_details');
            if (!data) return;

            // 工事番号ごとの情報をマップに格納
            projectMap = new Map();
            data.forEach(item => {
                if (item.project_number) {
                    const existing = projectMap.get(item.project_number);
                    const customer = item.customer_name || (existing ? existing.customer : "");
                    const details = item.project_details || (existing ? existing.details : "");
                    
                    projectMap.set(item.project_number, {
                        customer: customer,
                        details: details
                    });
                }
            });

            const nums = Array.from(projectMap.keys()).sort();
            const select = document.getElementById('project_select');
            
            let options = '<option value="">（全工事表示）</option>';
            nums.forEach(n => {
                const selected = String(n) === String(projectParam) ? ' selected' : '';
                options += `<option value="${n}"${selected}>${n}</option>`;
            });
            select.innerHTML = options;

            // 初期表示の同期
            updateDisplay();
            
            select.addEventListener('change', () => {
                updateDisplay();
            });
        }

        // 初期化関数
        async function initialize() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectParam = urlParams.get('project_no') || urlParams.get('project');
            console.log("URLパラメータ:", projectParam);

            // 0. プラグインの有効化
            gantt.plugins({
                marker: true,
                multiselect: true
            });

            // 1. Gantt初期化
            gantt.config.columns = _getDrawingColumns();
            _setLayout(_getColsSum(gantt.config.columns));
            gantt.init("gantt_here");

            // === グリッド操作設定 ===

            // タスク選択が変わるたびに選択削除ボタンを更新
            gantt.attachEvent("onTaskClick", function(id, e) {
                setTimeout(_updateMultiDeleteBtn, 0);
                return true;
            });
            gantt.attachEvent("onEmptyClick", function(e) {
                setTimeout(_updateMultiDeleteBtn, 0);
                return true;
            });

            // キャプチャフェーズでグリッドセルのクリックを横取り
            // → dhtmlxGanttのバブルリスナー（インライン編集起動）に届かせない
            // シングルクリック: バーが見えるようタイムラインをスクロール
            // ＋ボタン（.custom_add_btn）は横取りせずそのまま通過させる
            document.getElementById("gantt_here").addEventListener("click", function(e) {
                if (e.target.closest(".custom_add_btn")) return;
                const cell = e.target.closest(".gantt_cell");
                if (!cell) return;
                e.stopImmediatePropagation();
                const row = cell.closest("[task_id]");
                if (row) gantt.showTask(row.getAttribute("task_id"));
            }, true);

            // ダブルクリック: インラインエディタを開く（ライトボックスはブロック）
            // バーのダブルクリックは .gantt_cell を持たないため通過し、デフォルトのライトボックスが開く
            document.getElementById("gantt_here").addEventListener("dblclick", function(e) {
                const cell = e.target.closest(".gantt_cell");
                if (!cell) return;
                e.stopImmediatePropagation();
                const row = cell.closest("[task_id]");
                if (!row) return;
                const taskId = row.getAttribute("task_id");
                if (!taskId) return;
                const cells = [...row.querySelectorAll(".gantt_cell")];
                const colIndex = cells.indexOf(cell);
                const col = gantt.config.columns[colIndex];
                if (col && col.editor) {
                    gantt.ext.inlineEditors.startEdit(taskId, col.name);
                }
            }, true);

            // 右クリックコンテキストメニュー（コピー・削除）
            const _ctxMenu = document.createElement('div');
            _ctxMenu.id = 'gantt_ctx_menu';
            _ctxMenu.innerHTML =
                '<div id="gantt_ctx_copy"  class="gantt_ctx_item">このタスクをコピー</div>' +
                '<div id="gantt_ctx_delete" class="gantt_ctx_item">このタスクを削除</div>';
            document.body.appendChild(_ctxMenu);

            let _ctxTaskId = null;
            document.getElementById("gantt_here").addEventListener("contextmenu", function(e) {
                const row = e.target.closest("[task_id]");
                if (!row) return;
                e.preventDefault();
                _ctxTaskId = row.getAttribute("task_id");
                _ctxMenu.style.left = e.pageX + 'px';
                _ctxMenu.style.top = e.pageY + 'px';
                _ctxMenu.style.display = 'block';
            });

            // コピー
            document.getElementById("gantt_ctx_copy").addEventListener("click", async function() {
                const taskId = _ctxTaskId;
                _ctxMenu.style.display = 'none';
                _ctxTaskId = null;
                if (!taskId || !gantt.isTaskExists(taskId)) return;

                const src = gantt.getTask(taskId);
                const { data, error } = await supabaseClient
                    .from('tasks')
                    .insert([{
                        text:              src.text              || "",
                        start_date:        src.start_date instanceof Date ? src.start_date.toISOString() : src.start_date,
                        end_date:          src.end_date   instanceof Date ? src.end_date.toISOString()   : src.end_date,
                        project_number:    src.project_number    || "",
                        machine:           src.machine           || "",
                        unit:              src.unit              || "",
                        unit2:             src.unit2             || "",
                        model_type:        src.model_type        || "",
                        characteristic:    src.characteristic    || "",
                        derivation:        src.derivation        || "",
                        owner:             src.owner             || "",
                        total_sheets:      Number(src.total_sheets)      || 0,
                        completed_sheets:  Number(src.completed_sheets)  || 0,
                        task_type:         src.task_type         || "drawing",
                        is_detailed:       true
                    }])
                    .select();

                if (error) {
                    console.error("Error copying task:", error);
                    alert("タスクのコピーに失敗しました。\n" + error.message);
                    return;
                }

                await loadData();

                if (data && data[0]) {
                    gantt.showTask(data[0].id);
                }
            });

            // 削除
            document.getElementById("gantt_ctx_delete").addEventListener("click", function() {
                if (_ctxTaskId && confirm("このタスクを削除しますか？")) {
                    gantt.deleteTask(_ctxTaskId);
                }
                _ctxMenu.style.display = 'none';
                _ctxTaskId = null;
            });

            document.addEventListener("click", function(e) {
                if (!e.target.closest('#gantt_ctx_menu')) {
                    _ctxMenu.style.display = 'none';
                }
            });

            // 2. セレクトボックスを構築（パラメータがあれば selected になる）
            await initProjectSelect(projectParam); 
            
            // 3. マーカー追加
            const today = new Date();
            gantt.addMarker({
                start_date: today,
                css: "today-line",
                text: "今日",
                title: "今日: " + gantt.templates.date_grid(today)
            });

            // 4. データを読み込む
            await loadData();

            // 5. フィルタ適用
            updateDisplay();

            // 6. 再描画
            gantt.render();

            // 7. 初期表示をリソース全画面（担当別）ビューにする
            _enterResourceFullscreen();
        }

        // 実行
        initialize();
    </script>
</body>
</html>
